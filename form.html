 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enrollment Form</title>

  <style>
    .col-md-4 {
  text-align: center;
}

/* Style the button */
.footer-link {
  display: inline-block;
  padding: 10px 20px;
  background-color: #007bff;
  color: #ffffff;
  text-decoration: none;
  border-radius: 5px;
  font-weight: 500;
  transition: all 0.3s ease;
}

/* Hover effect */
.footer-link:hover {
  background-color: #0056b3;
  color: #ffffff;
}
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
    }

    .container {
      width: 400px;
      margin: 50px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 10px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }

    .checkbox-group {
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Enrollment Form</h2>

    <form>
      <label>Name of Student:</label>
      <input type="text" name="name" required>

      <label>Phone Number:</label>
      <input type="tel" name="phone" required>

      <label>Email Address:</label>
      <input type="email" name="email" required>

      <label>Address:</label>
      <input type="text" name="address" required>

      <label>Course:</label>
      <select name="course" required>
        <option value="">-- Select Course --</option>
        <option>BS Information Technology</option>
        <option>BS Business Administration</option>
        <option>BS Criminology</option>
        <option>BS Hospitality Management</option>
        <option>BS Education</option>
      </select>

      <label>Requirements:</label>
      <div class="checkbox-group">
        <input type="checkbox"> Birth Certificate<br>
        <input type="checkbox"> Report Card (Form 138)<br>
        <input type="checkbox"> Good Moral Certificate<br>
        <input type="checkbox"> 2x2 ID Pictures<br>
      </div>

      <div class="d-flex justify-content-center mt-5">
  <button class="btn btn-primary btn-lg"
          onclick="window.location.href='contact form.html'">
    Enroll Now
  </button>
</div>
    </form>
  </div>

</body>
</html>
